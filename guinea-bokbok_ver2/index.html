<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>기니피그 쓰다듬기</title>
  <style>
    :root {
      --hand-size: 128px;
      --panel-width: 280px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-user-drag: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
      cursor: none;
    }

    body {
      position: relative;
      color: #fff;
    }

    button, input {
      font: inherit;
    }

    .stage {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #111;
    }

    .photo-wrap {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .guinea {
      max-width: min(96vw, 1600px);
      max-height: 92vh;
      width: auto;
      height: auto;
      object-fit: contain;
      display: none;
      pointer-events: none;
      transform: translate(0px, 0px) scale(1);
      transform-origin: center center;
      transition:
        filter 0.12s ease,
        opacity 0.2s ease,
        transform 0.12s ease;
      will-change: filter, opacity, transform;
    }

    .guinea.visible {
      display: block;
    }

    .guinea.dragging {
      transition: filter 0.12s ease, opacity 0.2s ease;
    }

    .guinea.petting {
      filter: brightness(1.03) saturate(1.08);
    }

    .empty-state {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(88vw, 520px);
      padding: 22px 24px;
      border-radius: 18px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.92);
      text-align: center;
      line-height: 1.6;
      pointer-events: none;
    }

    .empty-state strong {
      display: block;
      margin-bottom: 8px;
      font-size: 17px;
    }

    .drop-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.42);
      z-index: 70;
      pointer-events: none;
    }

    .drop-overlay.active {
      display: flex;
    }

    .drop-box {
      padding: 28px 34px;
      border-radius: 20px;
      background: rgba(20,20,20,0.92);
      border: 2px dashed rgba(255,255,255,0.35);
      color: #fff;
      font-size: 18px;
      text-align: center;
      backdrop-filter: blur(6px);
    }

    .hand {
      position: fixed;
      left: 0;
      top: 0;
      width: var(--hand-size);
      height: var(--hand-size);
      font-size: var(--hand-size);
      pointer-events: none;
      z-index: 9999;
      transform: translate(-34%, -18%) rotate(8deg) scale(1);
      transform-origin: 35% 30%;
      will-change: transform, left, top;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .hand-emoji {
      display: block;
      transform: scaleX(-1);
      transform-origin: center center;
      filter: drop-shadow(0 5px 10px rgba(0,0,0,0.35));
    }

    .hand.press {
      transform: translate(-34%, -10%) rotate(18deg) scale(0.94);
    }

    .hand.petting-left {
      transform: translate(-34%, -10%) rotate(22deg) scale(0.92);
    }

    .hand.petting-right {
      transform: translate(-34%, -10%) rotate(10deg) scale(0.92);
    }

    .hearts-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 30;
      overflow: hidden;
    }

    .heart {
      position: fixed;
      left: 0;
      top: 0;
      pointer-events: none;
      line-height: 1;
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.8);
      animation: heartFloat 900ms ease-out forwards;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.18));
      will-change: transform, opacity;
    }

    @keyframes heartFloat {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) translateY(10px) scale(0.6);
      }
      15% {
        opacity: 1;
        transform: translate(-50%, -50%) translateY(0px) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) translateY(-45px) scale(1.15);
      }
    }

    .side-panel {
      position: fixed;
      right: 14px;
      top: 14px;
      bottom: 14px;
      width: var(--panel-width);
      z-index: 50;
      background: rgba(18,18,18,0.76);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: transform 0.22s ease, opacity 0.22s ease;
      overflow: auto;
      scrollbar-width: thin;
    }

    .side-panel.collapsed {
      transform: translateX(calc(100% + 24px));
      opacity: 0;
      pointer-events: none;
    }

    .panel-open-btn {
      position: fixed;
      right: 16px;
      top: 18px;
      width: 52px;
      height: 52px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(18,18,18,0.8);
      color: #fff;
      backdrop-filter: blur(10px);
      z-index: 55;
      display: none;
      cursor: pointer;
      font-size: 24px;
      line-height: 1;
    }

    .panel-open-btn.visible {
      display: block;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .panel-title {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
    }

    .panel-close-btn {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: none;
      background: rgba(255,255,255,0.12);
      color: #fff;
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
      flex: 0 0 auto;
    }

    .section {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px 0;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .section:first-of-type {
      border-top: none;
      padding-top: 0;
    }

    .section-title {
      font-size: 12px;
      color: rgba(255,255,255,0.82);
      font-weight: 700;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .row.tight {
      gap: 6px;
      flex-wrap: nowrap;
    }

    .counter {
      min-width: 56px;
      text-align: center;
      font-size: 12px;
      color: #fff;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 8px 11px;
      background: #fff;
      color: #111;
      font-size: 12px;
      cursor: pointer;
      transition: transform 0.08s ease, opacity 0.12s ease, background 0.15s ease;
      flex: 0 0 auto;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(1px);
    }

    .danger-btn {
      background: #ffd9d9;
      color: #5e1515;
    }

    .switch-wrap {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .label-text {
      font-size: 13px;
      color: #fff;
    }

    .switch {
      position: relative;
      width: 42px;
      height: 24px;
      display: inline-block;
      flex: 0 0 auto;
    }

    .switch input {
      display: none;
    }

    .switch-slider {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.28);
      border-radius: 999px;
      transition: background 0.15s ease;
      cursor: pointer;
    }

    .switch-slider::before {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.15s ease;
    }

    .switch input:checked + .switch-slider {
      background: #6fdc8c;
    }

    .switch input:checked + .switch-slider::before {
      transform: translateX(18px);
    }

    .range-wrap {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .range-wrap input[type="range"] {
      width: 100%;
      cursor: pointer;
    }

    .range-value {
      min-width: 48px;
      text-align: right;
      font-size: 12px;
      color: rgba(255,255,255,0.9);
      font-variant-numeric: tabular-nums;
    }

    .jump-input {
      width: 62px;
      height: 32px;
      padding: 4px 6px;
      border: none;
      border-radius: 10px;
      outline: none;
      font-size: 12px;
      text-align: center;
      background: rgba(255,255,255,0.95);
      color: #111;
    }

    .jump-total {
      font-size: 12px;
      color: rgba(255,255,255,0.8);
    }

    .size-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .size-btn {
      background: rgba(255,255,255,0.12);
      color: #fff;
      padding: 8px 0;
    }

    .size-btn.active {
      background: #fff;
      color: #111;
      font-weight: 700;
    }

    .helper {
      font-size: 11px;
      line-height: 1.45;
      color: rgba(255,255,255,0.65);
    }

    .hidden-input {
      display: none;
    }
  </style>
</head>
<body>
  <div class="stage">
    <div id="photoWrap" class="photo-wrap">
      <img id="guinea" class="guinea" src="" alt="기니피그" draggable="false" />
      <div id="emptyState" class="empty-state">
        <strong>사진이 아직 없습니다</strong>
        사진 파일을 이 화면 위로 끌어다 놓으시거나,<br>
        조정바의 <b>사진 추가</b> 버튼으로 넣으시면 됩니다.
      </div>
    </div>
  </div>

  <div id="dropOverlay" class="drop-overlay">
    <div class="drop-box">여기에 사진 놓기</div>
  </div>

  <div id="heartsLayer" class="hearts-layer"></div>

  <div id="hand" class="hand" aria-hidden="true">
    <span id="handEmoji" class="hand-emoji">🫳</span>
  </div>

  <input id="fileInput" class="hidden-input" type="file" accept="image/*" multiple />

  <aside id="sidePanel" class="side-panel">
    <div class="panel-header">
      <div class="panel-title">조정바</div>
      <button id="panelCloseBtn" class="panel-close-btn" type="button" aria-label="조정바 접기">&gt;</button>
    </div>

    <div class="section">
      <div class="section-title">사진</div>
      <div class="row">
        <button id="addBtn" type="button">사진 추가</button>
        <button id="removeBtn" class="danger-btn" type="button">현재삭제</button>
        <button id="clearBtn" class="danger-btn" type="button">전체삭제</button>
      </div>
      <div class="row tight">
        <button id="prevBtn" type="button">‹</button>
        <div id="counter" class="counter">0 / 0</div>
        <button id="nextBtn" type="button">›</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">효과</div>
      <div class="switch-wrap">
        <span class="label-text">하트모드</span>
        <label class="switch" aria-label="하트모드 토글">
          <input id="heartToggle" type="checkbox" checked />
          <span class="switch-slider"></span>
        </label>
      </div>
      <div class="helper">켜짐: 하트 생성 + 손 흔들림 / 꺼짐: 둘 다 비활성화</div>
      
    </div>

    <div class="section">
      <div class="section-title">커서 크기</div>
      <div class="size-buttons">
        <button id="cursorSmallBtn" class="size-btn" type="button">소</button>
        <button id="cursorMediumBtn" class="size-btn active" type="button">중</button>
        <button id="cursorLargeBtn" class="size-btn" type="button">대</button>
      </div>
      <div class="helper">우클릭하면 손 이모지가 바뀝니다.</div>
    </div>

    <div class="section">
      <div class="section-title">사진 크기</div>
      <div class="range-wrap">
        <input id="photoSize" type="range" min="70" max="220" value="100" step="5" />
        <span id="photoSizeValue" class="range-value">100%</span>
      </div>
      <div class="helper">마우스 휠로도 확대/축소할 수 있습니다.</div>
    </div>

    <div class="section">
      <div class="section-title">원하는 사진으로 이동</div>
      <div class="row tight">
        <input id="jumpInput" class="jump-input" type="number" min="1" value="1" />
        <span id="jumpTotal" class="jump-total">/ 0</span>
        <button id="jumpBtn" type="button">가기</button>
      </div>
    </div>

    <div class="section">
      <div class="helper">
        확대된 상태에서는 클릭+드래그로 사진을 움직일 수 있습니다.<br>
        사진 위로 파일을 끌어다 놓으면 바로 추가됩니다.
      </div>
    </div>
  </aside>

  <button id="panelOpenBtn" class="panel-open-btn" type="button" aria-label="조정바 펼치기">&lt;</button>

  <script>
    const guinea = document.getElementById("guinea");
    const photoWrap = document.getElementById("photoWrap");
    const emptyState = document.getElementById("emptyState");
    const dropOverlay = document.getElementById("dropOverlay");

    const hand = document.getElementById("hand");
    const handEmoji = document.getElementById("handEmoji");
    const heartsLayer = document.getElementById("heartsLayer");

    const fileInput = document.getElementById("fileInput");
    const addBtn = document.getElementById("addBtn");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const removeBtn = document.getElementById("removeBtn");
    const clearBtn = document.getElementById("clearBtn");

    const heartToggle = document.getElementById("heartToggle");
    const photoSize = document.getElementById("photoSize");
    const photoSizeValue = document.getElementById("photoSizeValue");

    const jumpInput = document.getElementById("jumpInput");
    const jumpTotal = document.getElementById("jumpTotal");
    const jumpBtn = document.getElementById("jumpBtn");
    const counter = document.getElementById("counter");

    const sidePanel = document.getElementById("sidePanel");
    const panelCloseBtn = document.getElementById("panelCloseBtn");
    const panelOpenBtn = document.getElementById("panelOpenBtn");

    const cursorSmallBtn = document.getElementById("cursorSmallBtn");
    const cursorMediumBtn = document.getElementById("cursorMediumBtn");
    const cursorLargeBtn = document.getElementById("cursorLargeBtn");

    const handEmojiList = ["🫳", "🖐", "🤚", "✋"];

    const state = {
      photos: [],
      currentIndex: 0,
      mouseX: window.innerWidth / 2,
      mouseY: window.innerHeight / 2,
      prevMouseX: window.innerWidth / 2,
      prevMouseY: window.innerHeight / 2,

      isMouseDown: false,
      isPanning: false,
      panStartMouseX: 0,
      panStartMouseY: 0,
      panStartX: 0,
      panStartY: 0,

      petInterval: null,
      petIdleTimeout: null,
      wobbleDir: false,
      petPower: 0,
      lastHeartAt: 0,
      heartModeEnabled: true,

      photoScale: 1,
      panX: 0,
      panY: 0,
      dragCounter: 0,

      cursorSize: localStorage.getItem("gp_cursor_size") || "medium",
      panelCollapsed: localStorage.getItem("gp_panel_collapsed") === "1",
      handEmojiIndex: Number(localStorage.getItem("gp_hand_emoji_index") || 0),
    };

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function hasPhotos() {
      return state.photos.length > 0;
    }

    function savePanelState() {
      localStorage.setItem("gp_panel_collapsed", state.panelCollapsed ? "1" : "0");
    }

    function setPanelCollapsed(collapsed) {
      state.panelCollapsed = collapsed;
      sidePanel.classList.toggle("collapsed", collapsed);
      panelOpenBtn.classList.toggle("visible", collapsed);
      savePanelState();
    }

    function applyCursorSize(size) {
      state.cursorSize = size;
      localStorage.setItem("gp_cursor_size", size);

      const root = document.documentElement;
      if (size === "small") root.style.setProperty("--hand-size", "48px");
      else if (size === "large") root.style.setProperty("--hand-size", "96px");
      else root.style.setProperty("--hand-size", "72px");

      cursorSmallBtn.classList.toggle("active", size === "small");
      cursorMediumBtn.classList.toggle("active", size === "medium");
      cursorLargeBtn.classList.toggle("active", size === "large");
    }

    function applyHandEmoji(index) {
      state.handEmojiIndex = (index + handEmojiList.length) % handEmojiList.length;
      handEmoji.textContent = handEmojiList[state.handEmojiIndex];
      localStorage.setItem("gp_hand_emoji_index", String(state.handEmojiIndex));
    }

    function cycleHandEmoji() {
      applyHandEmoji(state.handEmojiIndex + 1);
    }

    function updateEmptyState() {
      const empty = !hasPhotos();
      emptyState.style.display = empty ? "block" : "none";
      guinea.classList.toggle("visible", !empty);
      guinea.style.display = empty ? "none" : "block";
    }

    function updateCounter() {
      if (!hasPhotos()) {
        counter.textContent = "0 / 0";
        jumpInput.value = "";
        jumpInput.max = 0;
        jumpTotal.textContent = "/ 0";
        return;
      }

      counter.textContent = `${state.currentIndex + 1} / ${state.photos.length}`;
      jumpInput.value = state.currentIndex + 1;
      jumpInput.max = state.photos.length;
      jumpTotal.textContent = `/ ${state.photos.length}`;
    }

    function getDisplayedBaseSize() {
      const wrapRect = photoWrap.getBoundingClientRect();

      if (!guinea.naturalWidth || !guinea.naturalHeight) {
        return { width: 0, height: 0, wrapWidth: wrapRect.width, wrapHeight: wrapRect.height };
      }

      const maxWidth = Math.min(wrapRect.width * 0.96, 1600);
      const maxHeight = wrapRect.height * 0.92;
      const imageRatio = guinea.naturalWidth / guinea.naturalHeight;

      let width = maxWidth;
      let height = width / imageRatio;

      if (height > maxHeight) {
        height = maxHeight;
        width = height * imageRatio;
      }

      return {
        width,
        height,
        wrapWidth: wrapRect.width,
        wrapHeight: wrapRect.height
      };
    }

    function clampPan() {
      const { width, height, wrapWidth, wrapHeight } = getDisplayedBaseSize();
      const scaledWidth = width * state.photoScale;
      const scaledHeight = height * state.photoScale;

      const maxPanX = Math.max((scaledWidth - wrapWidth) / 2, 0);
      const maxPanY = Math.max((scaledHeight - wrapHeight) / 2, 0);

      state.panX = clamp(state.panX, -maxPanX, maxPanX);
      state.panY = clamp(state.panY, -maxPanY, maxPanY);
    }

    function applyPhotoTransform() {
      clampPan();
      guinea.style.transform = `translate(${state.panX}px, ${state.panY}px) scale(${state.photoScale})`;
    }

    function resetPan() {
      state.panX = 0;
      state.panY = 0;
      applyPhotoTransform();
    }

    function clearPetEffects() {
      clearInterval(state.petInterval);
      clearTimeout(state.petIdleTimeout);
      state.petInterval = null;
      state.petIdleTimeout = null;
      hand.classList.remove("press", "petting-left", "petting-right");
      guinea.classList.remove("petting");
      state.petPower = 0;
    }

    function setScaleFromPercent(percent) {
      const clampedPercent = clamp(Number(percent), 70, 220);
      state.photoScale = clampedPercent / 100;
      photoSize.value = clampedPercent;
      photoSizeValue.textContent = `${clampedPercent}%`;

      if (state.photoScale <= 1) {
        state.panX = 0;
        state.panY = 0;
      }

      applyPhotoTransform();
    }

    function zoomAtPoint(newScale, clientX, clientY) {
      const wrapRect = photoWrap.getBoundingClientRect();
      const wrapCenterX = wrapRect.left + wrapRect.width / 2;
      const wrapCenterY = wrapRect.top + wrapRect.height / 2;

      const localX = (clientX - wrapCenterX - state.panX) / state.photoScale;
      const localY = (clientY - wrapCenterY - state.panY) / state.photoScale;

      state.photoScale = newScale;

      state.panX = clientX - wrapCenterX - localX * state.photoScale;
      state.panY = clientY - wrapCenterY - localY * state.photoScale;

      if (state.photoScale <= 1) {
        state.panX = 0;
        state.panY = 0;
      }

      const percent = Math.round(state.photoScale * 100);
      photoSize.value = percent;
      photoSizeValue.textContent = `${percent}%`;

      applyPhotoTransform();
    }

    function revokePhoto(photo) {
      if (photo?.url) URL.revokeObjectURL(photo.url);
    }

    function showImage(index) {
      if (!hasPhotos()) {
        guinea.removeAttribute("src");
        updateCounter();
        updateEmptyState();
        clearPetEffects();
        resetPan();
        return;
      }

      state.currentIndex = (index + state.photos.length) % state.photos.length;
      guinea.style.opacity = "0.2";
      guinea.src = state.photos[state.currentIndex].url;

      guinea.onload = () => {
        updateCounter();
        updateEmptyState();
        requestAnimationFrame(() => {
          guinea.style.opacity = "1";
          resetPan();
        });
      };

      guinea.onerror = () => {
        guinea.alt = "이미지를 불러올 수 없습니다.";
        guinea.style.opacity = "1";
        updateCounter();
        updateEmptyState();
        resetPan();
      };
    }

    function addPhotos(files) {
      const imageFiles = Array.from(files).filter(file => file.type.startsWith("image/"));
      if (!imageFiles.length) return;

      const wasEmpty = !hasPhotos();

      imageFiles.forEach(file => {
        state.photos.push({
          name: file.name,
          url: URL.createObjectURL(file),
        });
      });

      updateCounter();
      updateEmptyState();

      if (wasEmpty) showImage(0);
    }

    function removeCurrentPhoto() {
      if (!hasPhotos()) return;

      revokePhoto(state.photos[state.currentIndex]);
      state.photos.splice(state.currentIndex, 1);

      if (!hasPhotos()) {
        state.currentIndex = 0;
        showImage(0);
        return;
      }

      if (state.currentIndex >= state.photos.length) {
        state.currentIndex = state.photos.length - 1;
      }

      showImage(state.currentIndex);
    }

    function clearAllPhotos() {
      state.photos.forEach(revokePhoto);
      state.photos = [];
      state.currentIndex = 0;
      showImage(0);
    }

    function nextImage() {
      if (!hasPhotos()) return;
      stopPetAnimation();
      stopPanMode();
      showImage(state.currentIndex + 1);
    }

    function prevImage() {
      if (!hasPhotos()) return;
      stopPetAnimation();
      stopPanMode();
      showImage(state.currentIndex - 1);
    }

    function jumpToImage() {
      if (!hasPhotos()) return;

      const value = Number(jumpInput.value);
      if (!Number.isInteger(value)) return;
      if (value < 1 || value > state.photos.length) return;

      stopPetAnimation();
      stopPanMode();
      showImage(value - 1);
    }

    function moveHand(x, y) {
      hand.style.left = x + "px";
      hand.style.top = y + "px";
    }

    function beginWobble() {
      if (state.petInterval || state.isPanning || !state.heartModeEnabled || !hasPhotos()) return;

      guinea.classList.add("petting");
      hand.classList.add("press");

      state.petInterval = setInterval(() => {
        state.wobbleDir = !state.wobbleDir;
        hand.classList.remove("petting-left", "petting-right");
        hand.classList.add(state.wobbleDir ? "petting-left" : "petting-right");
      }, 85);
    }

    function refreshPetActivity() {
      if (!state.heartModeEnabled || state.isPanning || !hasPhotos()) return;

      beginWobble();
      clearTimeout(state.petIdleTimeout);

      state.petIdleTimeout = setTimeout(() => {
        clearInterval(state.petInterval);
        state.petInterval = null;
        hand.classList.remove("petting-left", "petting-right");

        if (!state.isPanning && isInsideGuinea(state.mouseX, state.mouseY) && state.heartModeEnabled) {
          hand.classList.add("press");
          guinea.classList.add("petting");
        } else {
          clearPetEffects();
        }
      }, 150);
    }

    function startPetAnimation() {
      if (!state.heartModeEnabled) return;
      if (state.isPanning || !hasPhotos()) return;

      state.isMouseDown = true;
      refreshPetActivity();
    }

    function stopPetAnimation() {
      clearPetEffects();
      state.isMouseDown = false;
    }

    function setHoverPetState(active) {
      if (!state.heartModeEnabled) {
        clearPetEffects();
        return;
      }

      if (state.isPanning || !hasPhotos()) return;

      if (active) {
        hand.classList.add("press");
        guinea.classList.add("petting");
      } else {
        clearPetEffects();
      }
    }

    function isInsideGuinea(x, y) {
      if (!hasPhotos()) return false;

      const rect = guinea.getBoundingClientRect();
      return (
        x >= rect.left &&
        x <= rect.right &&
        y >= rect.top &&
        y <= rect.bottom
      );
    }

    function canPanPhoto() {
      return state.photoScale > 1.001;
    }

    function startPanMode(clientX, clientY) {
      state.isPanning = true;
      state.panStartMouseX = clientX;
      state.panStartMouseY = clientY;
      state.panStartX = state.panX;
      state.panStartY = state.panY;
      guinea.classList.add("dragging");
      clearPetEffects();
    }

    function stopPanMode() {
      state.isPanning = false;
      guinea.classList.remove("dragging");
    }

    function spawnHeart() {
      const rect = guinea.getBoundingClientRect();
      if (rect.width < 40 || rect.height < 40) return;

      const now = Date.now();
      if (now - state.lastHeartAt < 80) return;
      state.lastHeartAt = now;

      const heart = document.createElement("div");
      heart.className = "heart";

      const symbols = ["❤", "♥", "💗", "💖"];
      const symbol = symbols[Math.floor(Math.random() * symbols.length)];

      const x = rect.left + rect.width * (0.12 + Math.random() * 0.76);
      const y = rect.top + rect.height * (0.12 + Math.random() * 0.76);
      const size = 18 + Math.random() * 34;
      const rotate = -20 + Math.random() * 40;

      heart.textContent = symbol;
      heart.style.left = `${x}px`;
      heart.style.top = `${y}px`;
      heart.style.fontSize = `${size}px`;
      heart.style.transform = `translate(-50%, -50%) rotate(${rotate}deg)`;
      heart.style.animationDuration = `${750 + Math.random() * 450}ms`;

      heartsLayer.appendChild(heart);
      setTimeout(() => heart.remove(), 1300);
    }

    function tryMakeHearts(distanceMoved) {
      if (!state.heartModeEnabled) return;
      if (state.isPanning) return;
      if (!isInsideGuinea(state.mouseX, state.mouseY)) return;
      if (distanceMoved <= 0) return;

      state.petPower += distanceMoved;

      while (state.petPower >= 120) {
        spawnHeart();
        state.petPower -= 120;
      }
    }

    heartToggle.addEventListener("change", () => {
      state.heartModeEnabled = heartToggle.checked;
      if (!state.heartModeEnabled) clearPetEffects();
    });

    photoSize.addEventListener("input", (e) => {
      setScaleFromPercent(e.target.value);
    });

    jumpBtn.addEventListener("click", jumpToImage);
    jumpInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") jumpToImage();
    });

    addBtn.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", (e) => {
      addPhotos(e.target.files);
      fileInput.value = "";
    });

    prevBtn.addEventListener("click", prevImage);
    nextBtn.addEventListener("click", nextImage);
    removeBtn.addEventListener("click", removeCurrentPhoto);
    clearBtn.addEventListener("click", clearAllPhotos);

    panelCloseBtn.addEventListener("click", () => setPanelCollapsed(true));
    panelOpenBtn.addEventListener("click", () => setPanelCollapsed(false));

    cursorSmallBtn.addEventListener("click", () => applyCursorSize("small"));
    cursorMediumBtn.addEventListener("click", () => applyCursorSize("medium"));
    cursorLargeBtn.addEventListener("click", () => applyCursorSize("large"));

    photoWrap.addEventListener("wheel", (e) => {
      if (!isInsideGuinea(e.clientX, e.clientY)) return;

      e.preventDefault();

      const delta = e.deltaY < 0 ? 10 : -10;
      const currentPercent = Math.round(state.photoScale * 100);
      const nextPercent = clamp(currentPercent + delta, 70, 220);
      const nextScale = nextPercent / 100;

      if (nextScale === state.photoScale) return;
      zoomAtPoint(nextScale, e.clientX, e.clientY);
    }, { passive: false });

    window.addEventListener("mousemove", (e) => {
      state.mouseX = e.clientX;
      state.mouseY = e.clientY;
      moveHand(state.mouseX, state.mouseY);

      const dx = state.mouseX - state.prevMouseX;
      const dy = state.mouseY - state.prevMouseY;
      const distanceMoved = Math.sqrt(dx * dx + dy * dy);
      const inside = isInsideGuinea(state.mouseX, state.mouseY);

      if (state.isPanning) {
        state.panX = state.panStartX + (state.mouseX - state.panStartMouseX);
        state.panY = state.panStartY + (state.mouseY - state.panStartMouseY);
        applyPhotoTransform();

        state.prevMouseX = state.mouseX;
        state.prevMouseY = state.mouseY;
        return;
      }

      if (inside) {
        if (state.heartModeEnabled && distanceMoved > 0.5) {
          refreshPetActivity();
        } else if (!state.isMouseDown && !state.petInterval && state.heartModeEnabled) {
          setHoverPetState(true);
        }

        tryMakeHearts(distanceMoved);
      } else {
        if (state.isMouseDown || state.petInterval) {
          stopPetAnimation();
        } else {
          setHoverPetState(false);
        }
        state.petPower = 0;
      }

      state.prevMouseX = state.mouseX;
      state.prevMouseY = state.mouseY;
    });

    window.addEventListener("mousedown", (e) => {
      if (e.button !== 0) return;
      if (!isInsideGuinea(state.mouseX, state.mouseY)) return;

      if (canPanPhoto()) {
        startPanMode(e.clientX, e.clientY);
        return;
      }

      startPetAnimation();
    });

    window.addEventListener("mouseup", (e) => {
      if (e.button !== 0) return;

      if (state.isPanning) {
        stopPanMode();
        if (isInsideGuinea(state.mouseX, state.mouseY) && state.heartModeEnabled) {
          setHoverPetState(true);
        }
        return;
      }

      if (state.isMouseDown) {
        state.isMouseDown = false;

        if (isInsideGuinea(state.mouseX, state.mouseY) && state.heartModeEnabled) {
          clearTimeout(state.petIdleTimeout);
          state.petIdleTimeout = null;
          clearInterval(state.petInterval);
          state.petInterval = null;
          hand.classList.remove("petting-left", "petting-right");
          hand.classList.add("press");
          guinea.classList.add("petting");
        } else {
          stopPetAnimation();
          setHoverPetState(false);
        }
      }
    });

    window.addEventListener("contextmenu", (e) => {
      e.preventDefault();
      cycleHandEmoji();
    });

    window.addEventListener("mouseleave", () => {
      stopPanMode();
      stopPetAnimation();
      setHoverPetState(false);
    });

    window.addEventListener("resize", () => {
      applyPhotoTransform();
    });

    window.addEventListener("keydown", (e) => {
      if (e.key === "ArrowRight") nextImage();
      if (e.key === "ArrowLeft") prevImage();
      if (e.key === "Escape") {
        stopPanMode();
        stopPetAnimation();
        setHoverPetState(false);
      }
    });

    window.addEventListener("dragenter", (e) => {
      e.preventDefault();
      state.dragCounter += 1;
      dropOverlay.classList.add("active");
    });

    window.addEventListener("dragover", (e) => {
      e.preventDefault();
    });

    window.addEventListener("dragleave", (e) => {
      e.preventDefault();
      state.dragCounter -= 1;
      if (state.dragCounter <= 0) {
        state.dragCounter = 0;
        dropOverlay.classList.remove("active");
      }
    });

    window.addEventListener("drop", (e) => {
      e.preventDefault();
      state.dragCounter = 0;
      dropOverlay.classList.remove("active");
      addPhotos(e.dataTransfer.files);
    });

    window.addEventListener("beforeunload", () => {
      state.photos.forEach(revokePhoto);
    });

    moveHand(state.mouseX, state.mouseY);
    heartToggle.checked = true;
    state.heartModeEnabled = true;
    applyCursorSize(state.cursorSize);
    applyHandEmoji(state.handEmojiIndex);
    setScaleFromPercent(photoSize.value);
    updateCounter();
    updateEmptyState();
    setPanelCollapsed(state.panelCollapsed);
  </script>
</body>
</html>
